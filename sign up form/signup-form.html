<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up Form</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>
    <header>
            <h1>Signup Form</h1>
    </header>
    <form>
        <div>
            <input type="email" name="email" placeholder="Email">
        </div>
        <div>
            <input type="password" name="password" placeholder="Create Password">
            <br>
            <input type="password" name="password" placeholder="Confirm Password">
        </div>
        <div>
            <h3><a class="link" href="#">Sign-up</a></h3>
            <p>Already have a account? <a class="login" href="#" target="_blank">Login</a></p>
            <p>OR</p>
            <h3><a class="link" href="#">Login with Facebook</a></h3>
            <h3><a class="link" href="#">Login with Google</a></h3>
        </div>
        <footer>
            <p>Designed by Tawqeer</p>
        </footer>
    </form>
</body>
</html>
